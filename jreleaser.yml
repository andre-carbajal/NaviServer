project:
  name: naviger
  version: 1.12.1
  description: Modern Minecraft Server Manager
  longDescription: Naviger is a lightweight, cross-platform Minecraft server manager with Web UI, CLI, and native integration.
  copyright: 2026 Andre Carbajal
  links:
    homepage: https://github.com/andre-carbajal/Naviger
    license: https://github.com/andre-carbajal/Naviger/blob/main/LICENSE
    bugTracker: https://github.com/andre-carbajal/Naviger/issues
  authors:
    - Andre Carbajal
  license: MIT
  inceptionYear: 2026
  languages:
    java:
      enabled: false

release:
  github:
    owner: andre-carbajal
    name: Naviger
    overwrite: true
    uploadAssets: ALWAYS
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: "- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}"

distributions:
  naviger:
    type: NATIVE_PACKAGE
    tags:
      - minecraft
      - server-manager
      - admin-tool
      - go
      - react
    artifacts:
      - path: build/Naviger-{{projectVersion}}-linux.deb
        platform: linux-x86_64
      - path: build/Naviger-{{projectVersion}}-macos.pkg
        platform: osx
      - path: build/Naviger-{{projectVersion}}-windows.exe
        platform: windows-x86_64
        extraProperties:
          skipScoop: true
      - path: build/Naviger-{{projectVersion}}-linux.zip
        platform: linux-x86_64
        extraProperties:
          skipSnap: true
      - path: build/Naviger-{{projectVersion}}-macos.zip
        platform: osx
        extraProperties:
          skipBrew: true
      - path: build/Naviger-{{projectVersion}}-windows.zip
        platform: windows-x86_64
        extraProperties:
          skipWinget: true
          skipScoop: false

    brew:
      active: ALWAYS
      extraProperties:
        skipCaskDisplayNameTransform: true
      formulaName: Naviger
      repository:
        owner: andre-carbajal
        name: packages
      cask:
        enabled: true
        name: naviger
        displayName: Naviger
        appName: Naviger.app
        pkgName: Naviger-{{projectVersion}}-macos.pkg
        uninstall:
          pkgutil:
            - com.naviger.server
        zap:
          trash:
            - /Applications/Naviger.app
            - /usr/local/bin/naviger-cli
            - /etc/paths.d/naviger
            - ~/Library/Logs/Naviger
            - "~/Library/Application Support/Naviger"

    scoop:
      active: ALWAYS
      repository:
        owner: andre-carbajal
        name: packages

    winget:
      active: ALWAYS
      package:
        identifier: AndreCarbajal.Naviger
        name: Naviger
      publisher:
        name: AndreCarbajal
        url: https://github.com/andre-carbajal
        supportUrl: https://github.com/andre-carbajal/Naviger/issues
      repository:
        owner: andre-carbajal
        name: packages

    snap:
      active: ALWAYS
      packageName: naviger
      base: core22
      grade: stable
      confinement: strict
      localPlugs:
        - network
        - home
      exportedLogin: /tmp/snapcraft.login
      repository:
        owner: andre-carbajal
        name: packages

    flatpak:
      active: ALWAYS
      componentId: com.naviger.Naviger
      developerName: Andre Carbajal
      runtime: FREEDESKTOP
      runtimeVersion: "23.08"
      finishArgs:
        - --share=network
        - --share=ipc
        - --socket=fallback-x11
        - --socket=wayland
        - --device=dri
        - --filesystem=home
      icons:
        - url: https://raw.githubusercontent.com/andre-carbajal/Naviger/main/cmd/server/icon.png
          width: 512
          height: 512
      repository:
        owner: andre-carbajal
        name: packages
