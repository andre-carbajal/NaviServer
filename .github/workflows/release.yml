name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-native:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          check-latest: true

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev dpkg

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Vet Go code
        env:
          CGO_ENABLED: 1
        run: go vet ./...

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          CGO_ENABLED: 1
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          export NAVIGER_VERSION="${VERSION}"
          chmod +x build.sh
          ./build.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\build.bat
        env:
          CGO_ENABLED: 1
        shell: cmd

      - name: Set MYAPP_VERSION (Windows, strip v)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          $v = $env:GITHUB_REF_NAME
          if ($v -like 'v*') { $v = $v.Substring(1) }
          Write-Output "MYAPP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build the Inno Setup Installer
        if: runner.os == 'Windows'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: setup.iss

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          if ($VERSION -like 'v*') { $VERSION = $VERSION.Substring(1) }
          New-Item -ItemType Directory -Force -Path build
          Copy-Item "Output/Naviger-${{ env.MYAPP_VERSION }}-windows.exe" "build/Naviger-${VERSION}-windows.exe"
          $ZIP_NAME = "Naviger-${VERSION}-windows.zip"
          Compress-Archive -Path "dist/*" -DestinationPath "build/$ZIP_NAME" -Force

      - name: Create Zip Archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p "build/binaries"

          if [ "${{ matrix.name }}" = "macos" ]; then
            if ls dist/*.pkg >/dev/null 2>&1; then
              cp dist/*.pkg build/
            fi
            cp -R dist/Naviger.app "build/binaries/"
            cp dist/naviger-cli "build/binaries/" 2>/dev/null || true
            cp dist/naviger-server "build/binaries/" 2>/dev/null || true
            cp -R dist/web_dist "build/binaries/" 2>/dev/null || true
          elif [ "${{ matrix.name }}" = "linux" ]; then
            if ls dist/*.deb >/dev/null 2>&1; then
              cp dist/*.deb build/
            fi
            find dist -maxdepth 1 ! -name "*.deb" ! -name "dist" | xargs -I{} cp -r {} "build/binaries/"
          else
            cp -r dist/* "build/binaries/"
          fi

          ZIP_NAME="Naviger-${VERSION}-${{ matrix.name }}.zip"
          cd "build/binaries"
          zip -r "../${ZIP_NAME}" ./*
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: build/Naviger-*.*

  release:
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: build
          merge-multiple: true

      - name: Sychronize Version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Updating jreleaser.yml version to ${VERSION}"
          sed -i "s/version: .*/version: ${VERSION}/" jreleaser.yml

      - name: Install Snapcraft
        run: |
          sudo snap install snapcraft --classic
          sudo snap install core22

      - name: Write Snapcraft credentials
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          printf '%s' "$SNAPCRAFT_STORE_CREDENTIALS" > /tmp/snapcraft.login
          chmod 600 /tmp/snapcraft.login

      - name: Release and publish
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.JRELEASER_GITHUB_TOKEN }}
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.VERSION }}
          SNAPCRAFT_BUILD_ENVIRONMENT: host
